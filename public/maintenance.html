<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IXOPE - Under Maintenance</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a12;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #f3f5fb;
      overflow: hidden;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      opacity: 0.03;
      background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.3) 1px, transparent 0);
      background-size: 40px 40px;
    }

    .glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      animation: pulse 6s ease-in-out infinite;
    }

    .glow-1 { top: -200px; left: -100px; background: #0a84ff; }
    .glow-2 { bottom: -200px; right: -100px; background: #6366f1; animation-delay: 3s; }

    @keyframes pulse {
      0%, 100% { opacity: 0.1; transform: scale(1); }
      50% { opacity: 0.2; transform: scale(1.1); }
    }

    .container {
      position: relative;
      text-align: center;
      max-width: 480px;
      padding: 2rem;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 2rem;
      border-radius: 1.25rem;
      background: linear-gradient(135deg, #0a84ff, #6366f1);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 60px rgba(10, 132, 255, 0.3);
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .logo span {
      font-size: 1.5rem;
      font-weight: 800;
      color: white;
      letter-spacing: -0.5px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      background: linear-gradient(135deg, #f3f5fb, #8e96a8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      color: #8e96a8;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0.5rem 1.25rem;
      border-radius: 2rem;
      background: rgba(255, 159, 10, 0.1);
      border: 1px solid rgba(255, 159, 10, 0.2);
      color: #ff9f0a;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .status .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff9f0a;
      animation: blink 2s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .footer {
      margin-top: 3rem;
      color: #4a4a6a;
      font-size: 0.75rem;
    }

    .progress-bar {
      margin-top: 2rem;
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.05);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar .fill {
      height: 100%;
      width: 60%;
      background: linear-gradient(90deg, #0a84ff, #6366f1);
      border-radius: 2px;
      animation: progress 3s ease-in-out infinite;
    }

    @keyframes progress {
      0% { width: 20%; }
      50% { width: 80%; }
      100% { width: 20%; }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <div class="container">
    <div class="logo"><span>iXope</span></div>
    <h1>We're upgrading</h1>
    <p>IXOPE Medical Portal is undergoing scheduled maintenance. We'll be back shortly with an improved experience.</p>
    
    <div class="status">
      <span class="dot"></span>
      Maintenance in progress
    </div>

    <div class="progress-bar">
      <div class="fill"></div>
    </div>

    <div class="footer">
      <p style="color: #4a4a6a; margin: 0;">IXOPE Medical Technology &copy; 2026</p>
    </div>
  </div>
</body>
</html>
