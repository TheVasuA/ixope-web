server {
    listen 80;
    server_name ixope-hub.com www.ixope-hub.com;

    root /var/www/ixope-web;
    index index.html;

    # SPA fallback — serve index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend (avoids CORS entirely)
    location /captures/ {
        proxy_pass https://api.ixope-hub.com/captures/;
        proxy_set_header Host api.ixope-hub.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /devices/ {
        proxy_pass https://api.ixope-hub.com/devices/;
        proxy_set_header Host api.ixope-hub.com;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /patients/ {
        proxy_pass https://api.ixope-hub.com/patients/;
        proxy_set_header Host api.ixope-hub.com;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /auth/ {
        proxy_pass https://api.ixope-hub.com/auth/;
        proxy_set_header Host api.ixope-hub.com;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass https://api.ixope-hub.com/health;
        proxy_set_header Host api.ixope-hub.com;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Cache static assets
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
